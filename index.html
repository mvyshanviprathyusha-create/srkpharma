<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRK pharma</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;

}

.card{

max-width:700px;
width:100%;
background:rgba(255,255,255,.12);
backdrop-filter:blur(18px);
border-radius:25px;
padding:40px;
color:white;
box-shadow:0 20px 50px rgba(0,0,0,.35);

}

.logo{

font-size:40px;
font-weight:700;
text-align:center;
margin-bottom:10px;

}

.subtitle{

text-align:center;
font-size:18px;
opacity:.9;
margin-bottom:35px;

}

.section{

margin-bottom:25px;

}

.heading{

font-size:20px;
font-weight:600;
margin-bottom:12px;
border-left:5px solid #00E5FF;
padding-left:12px;

}

.website{

text-align:center;
margin:25px 0;

}

.website a{

color:#00E5FF;
font-size:22px;
font-weight:600;
text-decoration:none;

}

.website a:hover{

text-decoration:underline;

}

.branches{

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.branch{

background:rgba(255,255,255,.15);
padding:15px;
border-radius:15px;
transition:.3s;

}

.branch:hover{

transform:translateY(-5px);

}

.city{

font-size:18px;
font-weight:600;

}

.phone{

margin-top:6px;

}

.phone a{

color:white;
text-decoration:none;
font-size:17px;

}

.footer{

margin-top:35px;
text-align:center;
font-size:14px;
opacity:.8;

}

@media(max-width:650px){

.branches{

grid-template-columns:1fr;

}

.card{

padding:25px;

}

.logo{

font-size:32px;

}

}

</style>

</head>

<body>

<div class="logo">
SRK Medicals

</div>

</a>
